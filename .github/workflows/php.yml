name: PHP

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']

    steps:
    - name: Checkout
      uses: actions/checkout@v1

    - name: Setup PHP ${{ matrix.php-version }}
      uses: shivammathur/setup-php@8358ee0e2e8afe63c2fb8253d1d52085811ab1e5 # v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: mbstring, zip, sqlite3, filter
        coverage: xdebug

    - name: Install dependencies
      run: composer install --no-interaction

    - name: Copy configuration.php
      run: cp configuration_sample.php configuration.php

    - name: Execute tests
      run: XDEBUG_MODE=coverage vendor/bin/phpunit --coverage-clover=coverage.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@29386c70ef20e286228c72b668a06fd0e8399192 # v1.5.2
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
